syntax = "proto3";

package syfrah.v1;

option go_package = "github.com/sacha-ops/syfrah/gen/go/syfrah/v1;syfrahv1";

// ForgeService exposes bare-metal provisioning operations.
service ForgeService {
  // GetStatus returns the health and summary of the forge layer.
  rpc GetStatus(ForgeGetStatusRequest) returns (ForgeGetStatusResponse);
}

message ForgeGetStatusRequest {}

message ForgeGetStatusResponse {
  string status = 1;
}
