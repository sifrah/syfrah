syntax = "proto3";

package syfrah.overlay.v1;

option go_package = "github.com/sacha-ops/syfrah/gen/go/syfrah/v1;syfrahv1";

// OverlayService exposes virtual networking operations.
service OverlayService {
  // GetStatus returns the health and summary of the overlay layer.
  rpc GetStatus(OverlayGetStatusRequest) returns (OverlayGetStatusResponse);
}

message OverlayGetStatusRequest {}

message OverlayGetStatusResponse {
  string status = 1;
}
