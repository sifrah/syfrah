syntax = "proto3";

package syfrah.v1;

option go_package = "github.com/sacha-ops/syfrah/gen/go/syfrah/v1;syfrahv1";

// OrgService exposes organization and tenant management operations.
service OrgService {
  // GetStatus returns the health and summary of the org layer.
  rpc GetStatus(OrgGetStatusRequest) returns (OrgGetStatusResponse);
}

message OrgGetStatusRequest {}

message OrgGetStatusResponse {
  string status = 1;
}
