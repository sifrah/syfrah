syntax = "proto3";

package syfrah.v1;

option go_package = "github.com/sacha-ops/syfrah/gen/go/syfrah/v1;syfrahv1";

// StorageService exposes block and object storage operations.
service StorageService {
  // GetStatus returns the health and summary of the storage layer.
  rpc GetStatus(StorageGetStatusRequest) returns (StorageGetStatusResponse);
}

message StorageGetStatusRequest {}

message StorageGetStatusResponse {
  string status = 1;
}
