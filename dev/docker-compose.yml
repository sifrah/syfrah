services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syfrah-node1
    hostname: node1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    volumes:
      - ../target/debug/syfrah:/usr/local/bin/syfrah:ro
    networks:
      - mesh

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: syfrah-node2
    hostname: node2
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    volumes:
      - ../target/debug/syfrah:/usr/local/bin/syfrah:ro
    networks:
      - mesh

networks:
  mesh:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd00:cafe::/64
