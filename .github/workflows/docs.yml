name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'layers/*/README.md'
      - 'handbook/**'
      - 'documentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: self-hosted
    container:
      image: node:20
    steps:
      - uses: actions/checkout@v4

      - name: Sync docs from READMEs
        run: ./scripts/sync-docs.sh

      - name: Install dependencies
        working-directory: documentation
        run: npm ci

      - name: Build static site
        working-directory: documentation
        env:
          NEXT_PUBLIC_BASE_PATH: /syfrah
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: documentation/out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: self-hosted
    container:
      image: node:20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
