name: E2E Tests

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'layers/*/src/**'
      - 'bin/*/src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'layers/*/src/**'
      - 'bin/*/src/**'
      - 'tests/**'

jobs:
  # ── Build Docker image once ──────────────────────────────
  build:
    name: Build image
    runs-on: self-hosted
    container:
      image: docker:27
    services:
      dind:
        image: docker:27-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
    steps:
      - name: Connect to DinD
        shell: sh {0}
        run: |
          # Resolve DinD IP (runner DNS bug: actions/runner#4038)
          DIND_IP=$(getent hosts dind | awk '{print $1}')
          if [ -z "$DIND_IP" ]; then
            # Fallback: query host Docker via mounted socket
            DIND_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $(docker ps -qf "ancestor=docker:27-dind" | head -1) 2>/dev/null)
          fi
          if [ -z "$DIND_IP" ]; then echo "Could not resolve DinD IP" >&2; exit 1; fi
          # Save IP for other steps (not DOCKER_HOST, to avoid breaking runner internals)
          echo "DIND_IP=${DIND_IP}" >> "$GITHUB_ENV"
          # Wait for DinD daemon to be ready
          export DOCKER_HOST="tcp://${DIND_IP}:2375"
          echo "Resolved DinD at ${DIND_IP}, waiting..."
          i=0; while [ $i -lt 30 ]; do
            if docker info >/dev/null 2>&1; then echo "DinD ready"; exit 0; fi
            sleep 1; i=$((i+1))
          done
          echo "DinD not ready after 30s"; exit 1

      - uses: actions/checkout@v4

      - name: Build Docker image
        env:
          DOCKER_HOST: tcp://${{ env.DIND_IP }}:2375
        run: docker build -t syfrah-e2e-test -f tests/e2e/Dockerfile . --quiet

      - name: Save image
        env:
          DOCKER_HOST: tcp://${{ env.DIND_IP }}:2375
        run: docker save syfrah-e2e-test | gzip > /tmp/syfrah-e2e-test.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image
          path: /tmp/syfrah-e2e-test.tar.gz
          retention-days: 1

  # ── Discover which layers have E2E tests ─────────────────
  discover:
    name: Discover layers
    runs-on: self-hosted
    container:
      image: alpine:latest
    outputs:
      layers: ${{ steps.find.outputs.layers }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: apk add --no-cache jq
      - id: find
        run: |
          # Extract unique layer names from scenario filenames
          # e.g., 01_fabric_mesh.sh → fabric, 21_compute_vm.sh → compute
          layers=$(ls tests/e2e/scenarios/*.sh 2>/dev/null | \
            xargs -I{} basename {} | \
            sed 's/^[0-9]*_\([a-z]*\)_.*/\1/' | \
            sort -u | \
            jq -R . | jq -sc .)
          echo "layers=$layers" >> "$GITHUB_OUTPUT"
          echo "Found layers: $layers"

  # ── Run E2E tests per layer (parallel) ───────────────────
  test:
    name: E2E / ${{ matrix.layer }}
    needs: [build, discover]
    runs-on: self-hosted
    container:
      image: docker:27
    services:
      dind:
        image: docker:27-dind
        options: --privileged
        env:
          DOCKER_TLS_CERTDIR: ""
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        layer: ${{ fromJson(needs.discover.outputs.layers) }}
    steps:
      - name: Connect to DinD
        shell: sh {0}
        run: |
          DIND_IP=$(getent hosts dind | awk '{print $1}')
          if [ -z "$DIND_IP" ]; then
            DIND_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' $(docker ps -qf "ancestor=docker:27-dind" | head -1) 2>/dev/null)
          fi
          if [ -z "$DIND_IP" ]; then echo "Could not resolve DinD IP" >&2; exit 1; fi
          echo "DIND_IP=${DIND_IP}" >> "$GITHUB_ENV"
          export DOCKER_HOST="tcp://${DIND_IP}:2375"
          echo "Resolved DinD at ${DIND_IP}, waiting..."
          i=0; while [ $i -lt 30 ]; do
            if docker info >/dev/null 2>&1; then echo "DinD ready"; exit 0; fi
            sleep 1; i=$((i+1))
          done
          echo "DinD not ready after 30s"; exit 1

      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: e2e-image
          path: /tmp

      - name: Load image
        env:
          DOCKER_HOST: tcp://${{ env.DIND_IP }}:2375
        run: docker load < /tmp/syfrah-e2e-test.tar.gz

      - name: Run ${{ matrix.layer }} E2E tests
        env:
          SKIP_BUILD: "1"
          DOCKER_HOST: tcp://${{ env.DIND_IP }}:2375
        run: ./tests/e2e/run.sh ${{ matrix.layer }}
