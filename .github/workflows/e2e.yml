name: E2E Tests

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'layers/*/src/**'
      - 'bin/*/src/**'
      - 'tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'layers/*/src/**'
      - 'bin/*/src/**'
      - 'tests/**'

jobs:
  # ── Build Docker image once ──────────────────────────────
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t syfrah-e2e-test -f tests/e2e/Dockerfile . --quiet

      - name: Save image
        run: docker save syfrah-e2e-test | gzip > /tmp/syfrah-e2e-test.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-image
          path: /tmp/syfrah-e2e-test.tar.gz
          retention-days: 1

  # ── Discover scenario groups for parallel execution ──────
  discover:
    name: Discover groups
    runs-on: ubuntu-latest
    outputs:
      groups: ${{ steps.find.outputs.groups }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          # Build parallel groups from scenario filenames.
          # Each group runs as a separate CI job for faster feedback.
          groups='[
            {"name": "fabric-basic",       "filter": "0[1-7]_fabric"},
            {"name": "fabric-rotation",    "filter": "08_fabric"},
            {"name": "fabric-recovery",    "filter": "09_fabric|10_fabric|11_fabric"},
            {"name": "fabric-perf",        "filter": "1[23]_fabric"},
            {"name": "fabric-scale",       "filter": "1[4-9]_fabric|20_fabric"},
            {"name": "fabric-reconcile",   "filter": "2[5-7]_fabric"},
            {"name": "fabric-zones",       "filter": "2[89]_fabric|3[0-7]_fabric"},
            {"name": "fabric-misc",        "filter": "3[89]_fabric|4[0-9]_fabric|59_fabric"},
            {"name": "state",              "filter": "2[1-4]_state"},
            {"name": "quickstart",         "filter": "90_quickstart"},
            {"name": "ux-output",          "filter": "9[1-7]_ux"},
            {"name": "ux-flows",           "filter": "9[89]_ux|10[0-4]_ux"},
            {"name": "ux-errors",          "filter": "10[5-9]_ux|110_ux"},
            {"name": "install",            "filter": "test_install"}
          ]'
          echo "groups=$(echo "$groups" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$groups" | jq '. | length') groups"

  # ── Run E2E tests per group (parallel) ──────────────────
  test:
    name: E2E / ${{ matrix.group.name }}
    needs: [build, discover]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        group: ${{ fromJson(needs.discover.outputs.groups) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: e2e-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/syfrah-e2e-test.tar.gz

      - name: Run ${{ matrix.group.name }} E2E tests
        env:
          SKIP_BUILD: "1"
        run: ./tests/e2e/run.sh "${{ matrix.group.filter }}"
