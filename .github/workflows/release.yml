name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Auto-determine version and bump Cargo.toml ──────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.calc.outputs.next }}
      should_release: ${{ steps.calc.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if HEAD is a release commit
        id: guard
        run: |
          MSG=$(git log -1 --format=%s)
          if echo "$MSG" | grep -q '^release:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HEAD commit is a release commit — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate next version
        id: calc
        if: steps.guard.outputs.skip == 'false'
        run: |
          # Get latest tag
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST"

          # Parse semver
          SEMVER=${LATEST#v}
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)

          # Check commit messages since last tag
          COMMITS=$(git log "${LATEST}..HEAD" --oneline)
          echo "Commits since $LATEST:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE 'BREAKING|breaking:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '\[Feature\]|feat:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Next version: v$NEXT"

  # ── Wait for CI to pass ───────────────────────────────────
  ci:
    name: Wait for CI
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          check-regexp: ^(Secret scan|Validate .gitignore|Format|Discover crates|syfrah-.*)$
          wait-interval: 10

  # ── Bump Cargo.toml and push ─────────────────────────────
  bump:
    name: Bump version
    needs: [version, ci]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Cargo.toml
        env:
          VERSION: ${{ needs.version.outputs.next }}
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          echo "Updated Cargo.toml to version $VERSION"
          grep '^version' Cargo.toml

      - name: Commit and push version bump
        env:
          VERSION: ${{ needs.version.outputs.next }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Cargo.toml
          git commit -m "release: v${VERSION} [skip ci]"
          git push origin main

  # ── Build all targets ─────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [version, bump]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Linux x86_64 musl: install musl-tools
      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Linux aarch64: use cross for cross-compilation
      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      # Build with cargo for native targets
      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      # Build with cross for aarch64-linux-musl
      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/syfrah

  # ── Create release ────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives, install script, and checksums
        env:
          VERSION: ${{ needs.version.outputs.next }}
        run: |
          mkdir -p release
          for target_dir in artifacts/*/; do
            target=$(basename "$target_dir")
            archive="syfrah-v${VERSION}-${target}.tar.gz"
            chmod +x "${target_dir}syfrah"
            tar czf "release/${archive}" -C "$target_dir" syfrah
          done
          cp scripts/install.sh release/install.sh
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create git tag
        env:
          VERSION: ${{ needs.version.outputs.next }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.next }}
          generate_release_notes: true
          files: release/*
