name: Release

on:
  push:
    branches:
      - main
      - 'release/v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Auto-determine version ─────────────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.calc.outputs.next }}
      tag: ${{ steps.calc.outputs.tag }}
      channel: ${{ steps.calc.outputs.channel }}
      should_release: ${{ steps.calc.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          set -euo pipefail

          # Skip release: commits (loop prevention)
          if git log -1 --pretty=%s | grep -q '^release:'; then
            echo "Release commit detected — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if HEAD is already tagged
          HEAD_TAGS=$(git tag --points-at HEAD)
          if [ -n "$HEAD_TAGS" ]; then
            echo "HEAD is already tagged: $HEAD_TAGS — skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect channel from branch
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [[ "$BRANCH" == release/v* ]]; then
            CHANNEL="stable"
          else
            CHANNEL="beta"
          fi
          echo "Branch: $BRANCH → Channel: $CHANNEL"

          # Get latest stable tag (ignore beta tags for base version)
          LATEST=$(git tag -l 'v*' --sort=-v:refname | grep -v 'beta' | head -1 || echo "v0.0.0")
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest stable tag: $LATEST"

          # Parse semver from latest stable tag
          SEMVER=${LATEST#v}
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3 | cut -d- -f1)

          # Check commit messages since last tag for bump type
          COMMITS=$(git log "${LATEST}..HEAD" --oneline 2>/dev/null || echo "")
          echo "Commits since $LATEST:"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qiE 'BREAKING|breaking:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '\[Feature\]|feat:'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          if [ "$CHANNEL" = "beta" ]; then
            # Find the highest beta N for this base version
            LAST_BETA=$(git tag -l "v${BASE_VERSION}-beta.*" --sort=-v:refname | head -1 || echo "")
            if [ -n "$LAST_BETA" ]; then
              # Extract N from vX.Y.Z-beta.N
              LAST_N=$(echo "$LAST_BETA" | sed 's/.*-beta\.//')
              NEXT_N=$((LAST_N + 1))
            else
              NEXT_N=1
            fi
            NEXT_VERSION="${BASE_VERSION}-beta.${NEXT_N}"
            TAG="v${NEXT_VERSION}"
          else
            NEXT_VERSION="${BASE_VERSION}"
            TAG="v${NEXT_VERSION}"

            # For stable, check this exact tag doesn't exist already
            if git tag -l "$TAG" | grep -q .; then
              echo "Tag $TAG already exists — skipping"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG ($CHANNEL)"

  # ── Build all targets ─────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        env:
          SYFRAH_VERSION: ${{ needs.version.outputs.next }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          SYFRAH_VERSION: ${{ needs.version.outputs.next }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/syfrah

  # ── Create release ────────────────────────────────────────
  release:
    name: Create Release
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives, install script, and checksums
        env:
          VERSION: ${{ needs.version.outputs.next }}
        run: |
          mkdir -p release
          for target_dir in artifacts/*/; do
            target=$(basename "$target_dir")
            archive="syfrah-v${VERSION}-${target}.tar.gz"
            chmod +x "${target_dir}syfrah"
            tar czf "release/${archive}" -C "$target_dir" syfrah
          done
          cp scripts/install.sh release/install.sh
          cd release
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create git tag
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          prerelease: ${{ needs.version.outputs.channel == 'beta' }}
          generate_release_notes: true
          files: release/*
